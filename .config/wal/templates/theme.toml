[mgr]
cwd = {{ fg = "{color4}" }}

hovered         = {{ fg = "{color0}", bg = "{color4}" }}
preview_hovered = {{ underline = true }}

find_keyword  = {{ fg = "{color3}", italic = true }}
find_position = {{ fg = "{color5}", bg = "reset", italic = true }}

marker_copied   = {{ fg = "{color2}", bg = "{color2}" }}
marker_cut      = {{ fg = "{color1}", bg = "{color1}" }}
marker_marked   = {{ fg = "{color4}", bg = "{color4}" }}
marker_selected = {{ fg = "{color3}", bg = "{color3}" }}

tab_active   = {{ fg = "{color0}", bg = "{color4}" }}
tab_inactive = {{ fg = "{color7}", bg = "{color8}" }}
tab_width    = 1

count_copied   = {{ fg = "{color0}", bg = "{color2}" }}
count_cut      = {{ fg = "{color0}", bg = "{color1}" }}
count_selected = {{ fg = "{color0}", bg = "{color3}" }}

border_symbol = "│"
border_style  = {{ fg = "{color8}" }}

syntect_theme = ""

[mode]
normal_main = {{ fg = "{color0}", bg = "{color4}", bold = true }}
normal_alt  = {{ fg = "{color4}", bg = "{color8}" }}
select_main = {{ fg = "{color0}", bg = "{color2}", bold = true }}
select_alt  = {{ fg = "{color2}", bg = "{color8}" }}
unset_main  = {{ fg = "{color0}", bg = "{color5}", bold = true }}
unset_alt   = {{ fg = "{color5}", bg = "{color8}" }}

[status]
separator_open  = ""
separator_close = ""
separator_style = {{ fg = "{color8}", bg = "{color8}" }}

progress_label  = {{ bold = true }}
progress_normal = {{ fg = "{color4}", bg = "{color8}" }}
progress_error  = {{ fg = "{color1}", bg = "{color8}" }}

permissions_t = {{ fg = "{color6}" }}
permissions_r = {{ fg = "{color3}" }}
permissions_w = {{ fg = "{color1}" }}
permissions_x = {{ fg = "{color2}" }}
permissions_s = {{ fg = "{color7}" }}

[select]
border   = {{ fg = "{color4}" }}
active   = {{ fg = "{color5}" }}
inactive = {{}}

[input]
border   = {{ fg = "{color4}" }}
title    = {{}}
value    = {{}}
selected = {{ reversed = true }}

[confirm]
border      = {{ fg = "{color4}" }}
title       = {{ fg = "{color4}" }}
content     = {{}}
list        = {{}}
btn_yes     = {{ reversed = true }}
btn_no      = {{}}
btn_labels  = [ "  [Y]es  ", "  (N)o  " ]

[completion]
border   = {{ fg = "{color4}" }}
active   = {{ bg = "{color8}" }}
inactive = {{}}

[tasks]
border  = {{ fg = "{color4}" }}
title   = {{}}
hovered = {{ underline = true }}

[which]
mask            = {{ bg = "{color0}" }}
cand            = {{ fg = "{color6}" }}
rest            = {{ fg = "{color7}" }}
desc            = {{ fg = "{color5}" }}
separator       = "  "
separator_style = {{ fg = "{color8}" }}

[help]
on      = {{ fg = "{color6}" }}
run     = {{ fg = "{color5}" }}
desc    = {{ fg = "{color7}" }}
hovered = {{ bg = "{color8}", bold = true }}
footer  = {{ fg = "{color0}", bg = "{color7}" }}

[notify]
title_info  = {{ fg = "{color2}" }}
title_warn  = {{ fg = "{color3}" }}
title_error = {{ fg = "{color1}" }}

[filetype]
rules = [
  {{ mime = "image/*",         fg = "{color6}" }},
  {{ mime = "{{audio,video}}/*", fg = "{color3}" }},
  {{ mime = "application/{{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}}", fg = "{color5}" }},
  {{ url = "*/", fg = "{color4}", bold = true }},
  {{ mime = "*",               fg = "{color7}" }},
]
