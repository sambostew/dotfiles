# pywal → hyprland colour variables (rendered to ~/.cache/wal/colors-hyprland.conf).
# Same contract as colors-waybar.css / colors-rofi-custom.rasi: accent = color3.
$wal-accent = rgba({color3.strip}ff)
$wal-accent-soft = rgba({color3.strip}4d)
$wal-accent-faint = rgba({color3.strip}26)
$wal-dim = rgba({color8.strip}ff)
$wal-urgent = rgba({color1.strip}ff)
