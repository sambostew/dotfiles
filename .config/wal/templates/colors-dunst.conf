# pywal → dunst colours (rendered to ~/.cache/wal/colors-dunst.conf, read via
# ~/.config/dunst/dunstrc.d/99-wal.conf symlink). Accent = color3, near-solid
# black bg (CC ≈ 80%).
[global]
    frame_color = "#{color3.strip}4D"
    # title in the accent colour — format lives here (not dunstrc) because
    # the span colour must re-render with the palette
    format = "<b><span foreground='{color3}'>%s</span></b>\n%b"

[urgency_low]
    background = "#000000CC"
    foreground = "{color8}"

[urgency_normal]
    background = "#000000CC"
    foreground = "{foreground}"

[urgency_critical]
    background = "#000000CC"
    foreground = "{color1}"
    frame_color = "{color1}"
