# Hyprland config — ported from ~/dotfiles/.config/i3/config
# foldmethod=marker

#: Monitors {{{
# Wayland connector names differ from X11 (DisplayPort-0 → DP-1 etc).
# VERIFY after first launch with `hyprctl monitors` and fix if the
# left/centre/right order is wrong. Fallback line keeps unknown
# connectors usable instead of black.
# Scale 1.5 replicates the old X11 Xft.dpi 144 (144/96) — without it
# content renders 1.5x smaller than the i3 setup. Positions are in
# LOGICAL units: 3840/1.5 = 2560 per monitor.
monitor = DP-1,3840x2160@120,0x0,1.5
# DP-2 HDR verdict (2026-07-18): works (4K@120 10-bit XRGB2101010 fits) but
# the S2725QS is edge-lit — SDR-in-HDR is either dim (sdrbrightness 1.6) or
# washed out (1.8), unfixable in software. Default SDR; hdr-toggle.sh flips
# it for HDR video sessions (monitor OSD "Smart HDR" must be re-enabled too).
monitor = DP-2,3840x2160@120,2560x0,1.5
monitor = HDMI-A-1,3840x2160@60,5120x0,1.5
monitor = ,preferred,auto,1.5
#: }}}

#: Environment {{{
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = QT_QPA_PLATFORM,wayland;xcb
env = MOZ_ENABLE_WAYLAND,1
# NOTE: do NOT set STEAM_FORCE_DESKTOPUI_SCALING — suspected click-offset
# bugs in Steam's CEF UI; use Steam Settings → Interface → "Enlarge text
# and icons" for a bigger client UI instead.
#: }}}

#: Input {{{
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
}
#: }}}

#: XWayland {{{
# At monitor scale 1.5, XWayland apps get upscaled: blurry + misaligned
# in-game mouse coordinates (Steam). Render them at scale 1 instead.
# Trade-off: XWayland UIs (VirtualBox) draw smaller — revisit if annoying.
xwayland {
    force_zero_scaling = true
}
#: }}}

#: General / gaps / borders {{{
# i3 had: gaps inner 22, gaps outer 22, border pixel 0.
# i3 inner = total gap BETWEEN windows (22); hyprland gaps_in is per-side
# (doubles between windows) → 11. i3 edge gap = inner+outer = 44 → gaps_out.
# Borders: thin accent outline matching the waybar/rofi accent (pywal color3).
source = ~/.cache/wal/colors-hyprland.conf
general {
    gaps_in = 11
    gaps_out = 44
    border_size = 1
    col.active_border = $wal-accent-soft
    col.inactive_border = $wal-accent-faint
    layout = dwindle
}

# Replaces picom's global inactive-opacity 0.8 with a dim instead of
# transparency (cleaner on Wayland). Exclusions via nodim rules below.
decoration {
    dim_inactive = true
    dim_strength = 0.2
}

# Autotiling equivalent (built-in)
# (pseudotile option removed in 0.55; was unused — no pseudo bind exists)
# force_split 2 = always split right/bottom like i3; without it dwindle
# splits toward the mouse side (caused thunar opening left).
dwindle {
    preserve_split = true
    force_split = 2
}

# Defaults felt too slow (Simon 2026-07-17). Durations in ds: 3 = 300ms.
# (Was briefly suspected of causing left-opening windows — that was
# dwindle mouse-side splitting, fixed by force_split above.)
animations {
    enabled = true
    # open a touch slower than close (Simon 2026-07-17)
    animation = windowsIn, 1, 4, default, popin 80%
    animation = windowsOut, 1, 3, default
    animation = windows, 1, 3, default, popin 80%
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
}

misc {
    disable_hyprland_logo = true
    # FreeSync monitors: VRR for fullscreen windows (games) only — X11
    # couldn't do multi-monitor VRR at all, this is new with Wayland
    vrr = 2
    # Window swallowing (replaces i3-swallow.py). Ghostty's Wayland
    # app-id is com.mitchellh.ghostty — plain "ghostty" will NOT match.
    enable_swallow = true
    swallow_regex = ^(com\.mitchellh\.ghostty|kitty)$
    # Swallowing is PID-chain based: a browser launched from a terminal makes
    # its popouts (PayPal checkout etc.) trace back to ghostty and swallow the
    # terminal. The 0.55 rule engine has no no-swallow effect (checked source),
    # so exclude by title suffix — browsers/mail always append their app name.
    swallow_exception_regex = .*(Brave|Mozilla Firefox|Mozilla Thunderbird)$
}
#: }}}

#: Workspaces {{{
# i3 spread: 1,4,7 → left | 2,5,8 → centre | 3,6,9 → right.
# No defaultName: waybar maps id → icon. persistent so all three pills
# per monitor are always visible in the bar, i3-style.
workspace = 1, monitor:DP-1, persistent:true
workspace = 2, monitor:DP-2, persistent:true
workspace = 3, monitor:HDMI-A-1, persistent:true
workspace = 4, monitor:DP-1, persistent:true
workspace = 5, monitor:DP-2, persistent:true
workspace = 6, monitor:HDMI-A-1, persistent:true
workspace = 7, monitor:DP-1, persistent:true
workspace = 8, monitor:DP-2, persistent:true
workspace = 9, monitor:HDMI-A-1, persistent:true
#: }}}

#: Startup {{{
exec-once = awww-daemon
exec-once = ~/.config/hypr/wallpaper.sh
exec-once = systemctl --user start hyprpolkitagent
exec-once = hypridle
exec-once = dunst
exec-once = waybar    # Phase B (§11) — harmless no-op error until configured
# XWayland starts with NO RandR primary — Unity games then enumerate only
# "Display 0 DP-1" and hit-test against the wrong monitor (mouse dead on
# centre/right); CEF (Steam client) anchors popups to primary too. The old
# X11 setup had centre (DisplayPort-1) primary — replicate it. Running
# xrandr also forces XWayland to start early instead of lazily.
exec-once = sleep 2 && xrandr --output DP-2 --primary
# Systemic scaling for the permanently-X11 class (Steam, VirtualBox, games):
# with force_zero_scaling they render at physical res like the old X11
# session, so the old Xft.dpi 144 (~/.Xresources) makes them self-scale
# exactly as they did on i3. Wayland-native apps never read this.
exec-once = sleep 2 && xrdb -merge ~/.Xresources
#: }}}

#: Keybindings {{{
$mod = ALT

bind = $mod, Return, exec, ghostty
bind = $mod SHIFT, q, killactive
bind = $mod, d, exec, rofi -show drun

# Focus
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r
bind = $mod, left, movefocus, l
bind = $mod, down, movefocus, d
bind = $mod, up, movefocus, u
bind = $mod, right, movefocus, r

# Move window
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, down, movewindow, d
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, right, movewindow, r

# Layout
bind = $mod, v, layoutmsg, preselect d
# fullscreenstate 2 0 = fullscreen internally but do NOT tell the client —
# i3-style: browsers keep their tabs/UI instead of going F11-kiosk mode
bind = $mod, f, fullscreenstate, 2 0
bind = $mod, w, togglegroup
bind = $mod, e, layoutmsg, togglesplit
bind = $mod SHIFT, space, togglefloating
bind = $mod, space, cyclenext, floating

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# Session
bind = $mod SHIFT, c, exec, hyprctl reload
bind = $mod SHIFT, r, exec, hyprctl reload
bind = $mod SHIFT, e, exit

# Resize mode (i3 mode "resize")
bind = $mod, r, submap, resize
submap = resize
binde = , h, resizeactive, -100 0
binde = , j, resizeactive, 0 100
binde = , k, resizeactive, 0 -100
binde = , l, resizeactive, 100 0
binde = , left, resizeactive, -100 0
binde = , down, resizeactive, 0 100
binde = , up, resizeactive, 0 -100
binde = , right, resizeactive, 100 0
bind = , Return, submap, reset
bind = , escape, submap, reset
bind = $mod, r, submap, reset
submap = reset

# Apps
bind = $mod SHIFT, x, exec, hyprlock
bind = $mod SHIFT, t, exec, thunderbird
bind = $mod SHIFT, v, exec, virtualbox
bind = $mod SHIFT, b, exec, bitwarden
bind = $mod SHIFT, Return, exec, ghostty -e yazi

# Apps with auto-navigate (i3 did exec + workspace switch)
bind = $mod SHIFT, f, exec, [workspace 2] firefox
bind = $mod SHIFT, m, exec, [workspace 3] ghostty --title=newsboat -e zsh -ic newsboat
bind = $mod SHIFT, s, exec, [workspace 4] musique
bind = $mod SHIFT, o, exec, [workspace 5] brave
bind = $mod SHIFT, n, exec, [workspace 6] obsidian

# Screenshots (replaces scrot+xclip; same save-dir + clipboard behaviour)
bind = $mod, p, exec, mkdir -p ~/Pictures/screenshots && grim - | tee ~/Pictures/screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png | wl-copy
bind = $mod SHIFT, p, exec, mkdir -p ~/Pictures/screenshots && grim -g "$(slurp)" - | tee ~/Pictures/screenshots/screenshot_$(date +%Y%m%d_%H%M%S).png | wl-copy

# Media (PipeWire via pactl — unchanged from i3)
bindel = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Mouse (replaces floating_modifier)
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
#: }}}

#: Window rules {{{
# Workspace assignments (i3 for_window/assign). Class names are Wayland
# app-ids — VERIFY each with `hyprctl clients` once the app is open;
# XWayland apps (VirtualBox) keep their X11 class.
# Thunderbird's Wayland app-id is org.mozilla.Thunderbird (plain "thunderbird"
# was the X11 class)
windowrule = match:class ^(thunderbird|org\.mozilla\.Thunderbird)$, workspace 1
windowrule = match:class ^(firefox)$, workspace 2
windowrule = match:class ^(brave-browser)$, workspace 5
windowrule = match:class ^(obsidian)$, workspace 6
windowrule = match:class ^(VirtualBox Manager)$, workspace 9
windowrule = match:title ^(newsboat)$, workspace 3

# Steam games: force true fullscreen (they run borderless-windowed →
# bar overlays them otherwise). steam_app_* only covers Proton — native
# games use their binary name as class (e.g. "Tabletop Simulator.x86_64"),
# add them here as discovered. Steam client deliberately NOT workspace-
# pinned (suspected of contributing to mouse issues — Simon 2026-07-17).
windowrule = match:class ^(steam_app_.*)$, fullscreen on
windowrule = match:class ^(steam_app_.*)$, no_dim on
windowrule = match:class ^(Tabletop Simulator\.x86_64)$, fullscreen on
windowrule = match:class ^(Tabletop Simulator\.x86_64)$, no_dim on

# picom 100%-opacity exclusions → exclude from inactive dim
windowrule = match:class ^(firefox)$, no_dim on
windowrule = match:class ^(brave-browser)$, no_dim on
windowrule = match:class ^(mpv)$, no_dim on
windowrule = match:class ^(VirtualBox Machine)$, no_dim on
windowrule = match:class ^(VirtualBox Manager)$, no_dim on
windowrule = match:class ^(steam)$, no_dim on
#: }}}
